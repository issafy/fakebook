<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fakebook – Connect & Share</title>
  <meta name="description" content="Fakebook – A mini social network to share your moments." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════════════════ LOGIN SCREEN ══ -->
  <div id="login-screen" class="screen active">
    <div class="login-bg">
      <div class="login-blob b1"></div>
      <div class="login-blob b2"></div>
      <div class="login-blob b3"></div>
    </div>
    <div class="login-card glass">
      <div class="login-logo">
        <span class="logo-icon">f</span>
        <h1>Fakebook</h1>
      </div>
      <p class="login-subtitle">Connect with friends, share your world.</p>

      <div class="login-tabs">
        <button class="tab-btn active" id="tab-quick" onclick="switchTab('quick')">Quick Login</button>
        <button class="tab-btn" id="tab-creds" onclick="switchTab('creds')">Credentials</button>
      </div>

      <!-- Quick pick -->
      <div id="quick-tab" class="tab-content active">
        <p class="pick-label">Pick your profile</p>
        <div id="user-picker" class="user-picker">
          <div class="spinner"></div>
        </div>
      </div>

      <!-- Credentials form -->
      <div id="creds-tab" class="tab-content">
        <form id="login-form" onsubmit="handleLogin(event)">
          <div class="field-group">
            <label for="username-input">Username</label>
            <input id="username-input" type="text" placeholder="e.g. harry_p" autocomplete="username" />
          </div>
          <div class="field-group">
            <label for="password-input">Password</label>
            <input id="password-input" type="password" placeholder="password123" autocomplete="current-password" />
          </div>
          <div id="login-error" class="error-msg hidden"></div>
          <button type="submit" class="btn-primary btn-full" id="login-btn">
            <span>Sign In</span>
          </button>
        </form>
        <p class="hint">All users share the password: <code>password123</code></p>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════ FEED SCREEN ══ -->
  <div id="feed-screen" class="screen">

    <!-- Header -->
    <header class="app-header glass">
      <div class="header-inner">
        <div class="header-logo">
          <span class="logo-icon sm">f</span>
          <span class="logo-text">Fakebook</span>
        </div>
        <div class="header-actions">
          <div id="current-user-info" class="current-user">
            <img id="header-avatar" src="" alt="avatar" />
            <span id="header-name"></span>
          </div>
          <button class="btn-ghost" id="logout-btn" onclick="logout()">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="feed-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-card glass">
          <div class="sidebar-profile">
            <img id="sidebar-avatar" src="" alt="avatar" class="sidebar-avatar" />
            <div>
              <p id="sidebar-name" class="sidebar-full-name"></p>
              <p id="sidebar-username" class="sidebar-uname"></p>
            </div>
          </div>
          <p id="sidebar-bio" class="sidebar-bio"></p>
          <button class="btn-primary btn-full" id="new-post-btn" onclick="openNewPostModal()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New Post
          </button>
        </div>

        <div class="sidebar-card glass who-to-follow">
          <h3 class="sidebar-title">People</h3>
          <div id="people-list" class="people-list"></div>
        </div>
      </aside>

      <!-- Feed -->
      <section class="feed-column">
        <div id="feed-posts" class="posts-list">
          <div class="spinner centered"></div>
        </div>
      </section>
    </main>
  </div>

  <!-- ═══════════════════════════════════════════════ NEW POST MODAL ══ -->
  <div id="new-post-modal" class="modal-overlay hidden" onclick="closeModalOnBackdrop(event)">
    <div class="modal-card glass" id="modal-inner">
      <div class="modal-header">
        <h2>Create Post</h2>
        <button class="close-btn" onclick="closeNewPostModal()">✕</button>
      </div>
      <div class="modal-author">
        <img id="modal-avatar" src="" alt="avatar" />
        <span id="modal-author-name"></span>
      </div>
      <textarea id="post-content" placeholder="What's on your mind?" rows="4" maxlength="500"></textarea>
      <div id="char-count" class="char-count">0 / 500</div>
      <div class="field-group">
        <label>Image URL (optional)</label>
        <input id="post-image-url" type="url" placeholder="https://..." />
      </div>
      <div id="image-preview-wrap" class="image-preview-wrap hidden">
        <img id="image-preview" src="" alt="preview" />
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeNewPostModal()">Cancel</button>
        <button class="btn-primary" id="submit-post-btn" onclick="submitPost()">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Post
        </button>
      </div>
    </div>
  </div>

  <!-- ════════════════════════════════════════════ COMMENTS MODAL ══ -->
  <div id="comments-modal" class="modal-overlay hidden" onclick="closeCommentsOnBackdrop(event)">
    <div class="modal-card glass wide" id="comments-inner">
      <div class="modal-header">
        <h2>Comments</h2>
        <button class="close-btn" onclick="closeCommentsModal()">✕</button>
      </div>
      <div id="comments-list" class="comments-list"></div>
      <div class="comment-input-row">
        <img id="comment-author-avatar" src="" alt="avatar" />
        <input id="comment-input" type="text" placeholder="Write a comment…" maxlength="300" onkeydown="handleCommentKey(event)" />
        <button class="btn-primary sm" onclick="submitComment()">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
