server {
    listen 80;
    server_name _;   # Replace with your domain or IP, e.g. fakebook.example.com

    # Proxy everything to the Node.js app (Express serves both API + static files)
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (Vite HMR in dev, good habit in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client info to Express
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
    }

    # Let nginx serve the built static assets directly (faster than going through Node)
    location /assets/ {
        alias /home/issafy/Documents/Hogwarts/java/tdsi/fakebook/dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Increase max body size if users post large images via URL (optional)
    client_max_body_size 10M;
}
